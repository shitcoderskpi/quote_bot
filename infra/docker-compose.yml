services:
  redis:
    container_name: redis
    image: redis:7
    networks:
      - monitoring
  bot:
    container_name: telegram-bot
    hostname: telegram-bot
    networks:
      - monitoring
    build:
      context: ../services/bot
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      - BOT_TOKEN
      - REDIS_HOST
      - LOG_LVL
      - LOG_PATH
    ports:
      - "8000:8000"
    volumes:
      - ../services/logs:/app/logs

  generator:
    container_name: generator
    hostname: generator
    networks:
      - monitoring
    build:
      context: ../services/generator/
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      - RUST_LOG=info
      - REDIS_HOST
      - TEMPLATE
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped



networks:
  monitoring: