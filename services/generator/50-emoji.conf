<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Bind "emoji" generic to Noto Color Emoji -->
  <alias binding="same">
    <family>emoji</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>

  <alias binding="same">
    <family>sans-serif</family>
    <prefer>
      <family>SF Pro</family>
      <family>SF Pro Display</family>
      <family>SF Pro Text</family>
      <family>San Francisco Pro</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>monospace</family>
    <prefer>
      <family>SF Mono</family>
      <family>San Francisco Mono</family>
    </prefer>
  </alias>
</fontconfig>